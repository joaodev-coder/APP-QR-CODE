<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ITW Upload</title>
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --text: #0f172a;
      --muted: #475569;
      --accent: #0ea5a5;
      --accent-2: #0284c7;
      --success: #166534;
      --success-bg: #dcfce7;
      --error: #991b1b;
      --error-bg: #fee2e2;
      --border: #e2e8f0;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.22);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Lucida Sans Unicode", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 520px at 0% -10%, #1f3b8a 0%, transparent 55%),
        radial-gradient(1000px 520px at 100% 0%, #0f766e 0%, transparent 50%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      padding: 28px 14px;
    }

    .page {
      max-width: 940px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: reveal 0.45s ease-out;
    }

    .hero {
      padding: 24px;
      background:
        linear-gradient(130deg, rgba(14, 165, 165, 0.22), rgba(2, 132, 199, 0.2));
      border-bottom: 1px solid var(--border);
    }

    .hero h1 {
      margin: 0;
      font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
      font-size: clamp(1.8rem, 4.6vw, 2.7rem);
      letter-spacing: 0.2px;
      color: #082f49;
    }

    .hero p {
      margin: 10px 0 0;
      color: #0f3f53;
      font-size: 1rem;
    }

    .content {
      padding: 20px 20px 26px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .mode-card,
    .auth-card,
    .upload-card,
    .preview-card-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px;
    }

    .mode-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 0.92rem;
      font-weight: 700;
      border: 1px solid #cbd5e1;
      background: var(--surface-soft);
      color: #0f172a;
    }

    .mode-badge .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #64748b;
    }

    .mode-badge.private .dot {
      background: #ef4444;
    }

    .mode-badge.public .dot {
      background: #22c55e;
    }

    .auth-label,
    .upload-label,
    .preview-title {
      margin: 0 0 10px;
      font-weight: 700;
      color: #1e293b;
      font-size: 0.98rem;
    }

    .token-input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: var(--radius-sm);
      padding: 12px;
      font-size: 1rem;
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .token-input:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.12);
    }

    .upload-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .file-button,
    .send-button {
      border: 0;
      border-radius: 11px;
      font-weight: 700;
      font-size: 0.96rem;
      padding: 11px 14px;
      cursor: pointer;
      transition: transform 0.18s ease, filter 0.18s ease, opacity 0.18s ease;
    }

    .file-button {
      background: #0f172a;
      color: #fff;
    }

    .send-button {
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      color: #fff;
      margin-left: auto;
      min-width: 130px;
    }

    .file-button:hover,
    .send-button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .send-button:disabled,
    .file-button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }

    .hidden-input {
      display: none;
    }

    .selection-info,
    .constraints-info {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .constraints-info {
      margin-top: 6px;
      font-size: 0.83rem;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(126px, 1fr));
      gap: 12px;
    }

    .tile {
      border-radius: 12px;
      border: 1px solid #dbe3ee;
      background: #fff;
      overflow: hidden;
      animation: fadeUp 0.28s ease;
    }

    .thumb {
      aspect-ratio: 1 / 1;
      background: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #334155;
      font-weight: 700;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .meta {
      padding: 8px;
    }

    .meta .name {
      font-size: 0.82rem;
      font-weight: 700;
      color: #1e293b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meta .size {
      margin-top: 2px;
      font-size: 0.76rem;
      color: var(--muted);
    }

    .status {
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid transparent;
      font-size: 0.95rem;
      font-weight: 700;
      display: none;
      animation: fadeUp 0.22s ease;
    }

    .status.info {
      display: block;
      background: #e0f2fe;
      border-color: #bae6fd;
      color: #0c4a6e;
    }

    .status.success {
      display: block;
      background: var(--success-bg);
      border-color: #bbf7d0;
      color: var(--success);
    }

    .status.error {
      display: block;
      background: var(--error-bg);
      border-color: #fecaca;
      color: var(--error);
    }

    .empty-preview {
      color: var(--muted);
      font-size: 0.92rem;
      border: 1px dashed #cbd5e1;
      border-radius: 12px;
      padding: 18px;
      text-align: center;
      background: #f8fafc;
    }

    @media (max-width: 640px) {
      .hero {
        padding: 18px;
      }

      .content {
        padding: 14px 14px 18px;
      }

      .send-button {
        width: 100%;
        margin-left: 0;
      }

      .file-button {
        width: 100%;
      }

      .upload-actions {
        flex-direction: column;
        align-items: stretch;
      }
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <h1>Enviar Fotos para o PC</h1>
      <p>Selecione uma ou varias imagens, revise o preview e envie com seguranca.</p>
    </header>

    <section class="content">
      <div class="row">
        <div class="mode-card">
          <span id="modeBadge" class="mode-badge"><span class="dot"></span>Carregando modo...</span>
        </div>

        <div id="authCard" class="auth-card" style="display:none;">
          <p class="auth-label">Senha de upload</p>
          <input class="token-input" type="password" id="tokenInput" placeholder="Digite a senha configurada no .env">
        </div>

        <div class="upload-card">
          <p class="upload-label">Selecionar imagens</p>
          <div class="upload-actions">
            <input id="fileInput" class="hidden-input" type="file" multiple>
            <button id="pickButton" class="file-button" type="button">Escolher fotos</button>
            <button id="sendButton" class="send-button" type="button">Enviar</button>
          </div>
          <p id="selectionInfo" class="selection-info">Nenhuma imagem selecionada.</p>
          <p id="constraintsInfo" class="constraints-info">Carregando restricoes...</p>
        </div>

        <div class="preview-card-wrap">
          <p class="preview-title">Preview das imagens</p>
          <div id="previewArea"></div>
        </div>
      </div>

      <div id="status" class="status"></div>
    </section>
  </main>

  <script>
    const ui = {
      authRequired: true,
      files: [],
      isUploading: false,
      objectUrls: [],
    };

    const modeBadge = document.getElementById("modeBadge");
    const authCard = document.getElementById("authCard");
    const tokenInput = document.getElementById("tokenInput");
    const fileInput = document.getElementById("fileInput");
    const pickButton = document.getElementById("pickButton");
    const sendButton = document.getElementById("sendButton");
    const selectionInfo = document.getElementById("selectionInfo");
    const constraintsInfo = document.getElementById("constraintsInfo");
    const previewArea = document.getElementById("previewArea");
    const statusEl = document.getElementById("status");

    function setStatus(type, message) {
      statusEl.className = `status ${type}`;
      statusEl.textContent = message;
    }

    function clearStatus() {
      statusEl.className = "status";
      statusEl.textContent = "";
    }

    function formatBytes(bytes) {
      if (!Number.isFinite(bytes) || bytes < 1024) return `${bytes || 0} B`;
      const kb = bytes / 1024;
      if (kb < 1024) return `${kb.toFixed(1)} KB`;
      return `${(kb / 1024).toFixed(2)} MB`;
    }

    function clearObjectUrls() {
      for (const url of ui.objectUrls) {
        URL.revokeObjectURL(url);
      }
      ui.objectUrls = [];
    }

    function renderPreview() {
      clearObjectUrls();

      if (!ui.files.length) {
        previewArea.innerHTML = '<div class="empty-preview">Selecione imagens para visualizar o preview antes de enviar.</div>';
        selectionInfo.textContent = "Nenhuma imagem selecionada.";
        return;
      }

      selectionInfo.textContent = `${ui.files.length} arquivo(s) selecionado(s).`;

      const grid = document.createElement("div");
      grid.className = "preview-grid";

      for (const file of ui.files) {
        const tile = document.createElement("article");
        tile.className = "tile";

        const thumb = document.createElement("div");
        thumb.className = "thumb";

        if (file.type && file.type.startsWith("image/")) {
          const img = document.createElement("img");
          const url = URL.createObjectURL(file);
          ui.objectUrls.push(url);
          img.src = url;
          img.alt = file.name;
          thumb.appendChild(img);
        } else {
          thumb.textContent = "ARQ";
        }

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.innerHTML = `<div class="name" title="${file.name}">${file.name}</div><div class="size">${formatBytes(file.size)}</div>`;

        tile.appendChild(thumb);
        tile.appendChild(meta);
        grid.appendChild(tile);
      }

      previewArea.innerHTML = "";
      previewArea.appendChild(grid);
    }

    function setUploadingState(uploading) {
      ui.isUploading = uploading;
      sendButton.disabled = uploading;
      pickButton.disabled = uploading;
      fileInput.disabled = uploading;
      sendButton.textContent = uploading ? "Enviando..." : "Enviar";
    }

    async function loadConfig() {
      clearStatus();

      try {
        const res = await fetch(`/app/config?v=${Date.now()}`);
        const data = await res.json();

        ui.authRequired = !!data.auth_required;
        constraintsInfo.textContent = "Sem limitacao de tipo/tamanho no app. O limite real depende do servidor e da rede.";

        if (ui.authRequired) {
          modeBadge.className = "mode-badge private";
          modeBadge.innerHTML = '<span class="dot"></span>Modo private: senha obrigatoria';
          authCard.style.display = "block";
        } else {
          modeBadge.className = "mode-badge public";
          modeBadge.innerHTML = '<span class="dot"></span>Modo public: sem senha';
          authCard.style.display = "none";
        }
      } catch (error) {
        ui.authRequired = true;
        modeBadge.className = "mode-badge private";
        modeBadge.innerHTML = '<span class="dot"></span>Modo private: fallback local';
        authCard.style.display = "block";
        constraintsInfo.textContent = "Nao foi possivel carregar a configuracao do servidor.";
        setStatus("error", "Nao foi possivel carregar a configuracao do servidor.");
      }
    }

    async function uploadFiles() {
      if (ui.isUploading) return;

      if (!ui.files.length) {
        setStatus("error", "Selecione pelo menos 1 imagem antes de enviar.");
        return;
      }

      const token = tokenInput.value.trim();
      if (ui.authRequired && !token) {
        setStatus("error", "Digite a senha de upload para continuar.");
        return;
      }

      clearStatus();
      setUploadingState(true);

      try {
        let sent = 0;

        for (const file of ui.files) {
          setStatus("info", `Enviando ${file.name} (${sent + 1}/${ui.files.length})...`);

          const form = new FormData();
          form.append("file", file);

          const headers = {};
          if (token) {
            headers["X-Upload-Token"] = token;
          }

          const res = await fetch("/file/upload", {
            method: "POST",
            body: form,
            headers,
          });

          let data = {};
          try {
            data = await res.json();
          } catch (error) {
            data = {};
          }

          if (!res.ok) {
            const errorMessage = data.detail || "Falha no upload.";
            setStatus("error", `Erro ao enviar ${file.name}: ${errorMessage}`);
            return;
          }

          sent += 1;
        }

        setStatus("success", "Fotos enviadas com sucesso. Abra a pasta uploads no seu computador.");
        ui.files = [];
        fileInput.value = "";
        renderPreview();
      } catch (error) {
        setStatus("error", "Falha de conexao ao enviar as imagens.");
      } finally {
        setUploadingState(false);
      }
    }

    pickButton.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", (event) => {
      ui.files = Array.from(event.target.files || []);
      renderPreview();
      clearStatus();
    });

    sendButton.addEventListener("click", uploadFiles);

    window.addEventListener("DOMContentLoaded", async () => {
      await loadConfig();
      renderPreview();
    });
  </script>
</body>
</html>
